                class="nav-icon"
            >
        
            FLUJO
        
        </a>
        <a href="reportes.html"class="nav-item ">
    
            <img 
                src="../assets/img/admin/REPORTE.svg"
                alt="Reporte"
                class="nav-icon"
            >
        
            REPORTES
        
        </a>

        <a href="usuarios.html"class="nav-item ">
    
            <img

    <button id="btnLogout" class="btn-logout">
        CERRAR SESION
    </button>

</header>

<!-- hero -->

<section class="hero">

    <div class="hero-content">

        <div class="icon-puntos"></div>

        <h1>PUNTOS OFICIALES</h1>

        <p>
            Registro y administracion de puntos autorizados.
        </p>

    </div>

</section>

<!-- contenido -->

<main class="dashboard">

    <div class="form-container">

        <h2>Registrar Punto Oficial</h2>

        <form id="formPunto">

            <div class="input-group">

                <input 
                    type="text" 
                    name="nombre" 
                    placeholder="Nombre del punto"
                    required
                >

                <input 
                    type="text" 
                    name="direccion" 
                    placeholder="Dirección"
                    required
                >

            </div>

            <textarea 
                name="descripcion" 
                placeholder="Descripción"
            ></textarea>

            <div class="input-group">

                <input 
                    type="text" 
                    name="horario" 
                    placeholder="Horario"
                >

                <input 
                    type="text" 
                    name="telefono" 
                    placeholder="Telefono"
                >

            </div>

            <input type="hidden" name="latitud" id="latitud">
            <input type="hidden" name="longitud" id="longitud">

            <!-- buscador -->

            <div class="buscador-wrapper">

                <input
                    type="text"
                    id="input-buscar-agregar"
                    class="input-buscar"
                    placeholder="Buscar colonia en Baja California..."
                    oninput="filtrarSugerenciasAgregar(this.value)"
                    autocomplete="off"
                />

                <div id="sugerencias-agregar" class="sugerencias-lista"></div>

            </div>

            <!-- mapa -->

            <div id="mapa"></div>

            <!-- botones -->

            <div class="botones">

                <button type="submit">
                    Guardar Punto
                </button>

                <button type="button" id="btnVerPuntos">
                    Ver Puntos Registrados
                </button>

            </div>

        </form>

    </div>

    <!-- tabla -->

    <div id="tablaPuntosContainer"></div>

</main>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../assets/js/agregar.js"></script>
<script src="../assets/js/logout.js"></script>

</body>
