<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <div class="container">

        <h2>Iniciar Sesión</h2>

        <form id="formLogin">

            <input
                type="email"
                id="correo"
                placeholder="Correo"
                required>

            <input
                type="password"
                id="contrasena"
                placeholder="Contraseña"
                required>

            <button>
                Ingresar
            </button>

        </form>

    </div>

    <script src="../js/login.js"></script>

</body>

</html>
