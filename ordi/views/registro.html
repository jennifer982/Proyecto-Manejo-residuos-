<!DOCTYPE html>
<html>

<head>

    <title>Registro</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <div class="container">

        <h2>Registro de Usuario</h2>

        <form id="formRegistro">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre"
                required>

            <input
                type="email"
                id="correo"
                placeholder="Correo"
                required>

            <input
                type="password"
                id="contrasena"
                placeholder="Contraseña"
                required>

            <button>
                Registrarse
            </button>

        </form>

        <br>

        <a href="login.html">
            Ya tengo cuenta
        </a>

    </div>

    <script src="../js/registro.js"></script>

</body>

</html>
